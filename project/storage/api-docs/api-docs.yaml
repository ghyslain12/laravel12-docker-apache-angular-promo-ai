components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Token JWT ou Sanctum requis pour les endpoints protégés'
  schemas:
    # -------------------------
    # Input schemas (request body)
    # -------------------------
    UserInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: 'John Doe'
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: password123
    UserUpdateInput:
      type: object
      properties:
        name:
          type: string
          example: 'Updated Name'
        email:
          type: string
          format: email
          example: updated@example.com
        password:
          type: string
          format: password
          example: newpassword123
    CustomerInput:
      type: object
      required:
        - surnom
        - user_id
      properties:
        surnom:
          type: string
          example: Client1
        user_id:
          type: integer
          example: 1
    MaterialInput:
      type: object
      required:
        - designation
      properties:
        designation:
          type: string
          example: Material1
    SaleInput:
      type: object
      required:
        - titre
        - customer_id
      properties:
        titre:
          type: string
          example: Sale1
        description:
          type: string
          nullable: true
          example: 'Description of Sale1'
        customer_id:
          type: integer
          example: 1
        materials:
          type: array
          description: 'Liste des IDs de matériaux à associer à la vente (many-to-many via material_sale)'
          items:
            type: integer
          example: [1, 2]
    TicketInput:
      type: object
      required:
        - titre
        - sale_id
      properties:
        titre:
          type: string
          example: Ticket1
        description:
          type: string
          nullable: true
          example: 'Description of Ticket1'
        sale_id:
          type: integer
          example: 1
    # -------------------------
    # Response schemas
    # -------------------------
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 'John Doe'
        email:
          type: string
          format: email
          example: john@example.com
        created_at:
          type: string
          format: date-time
          example: '2024-10-09T10:00:00.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-10-09T10:00:00.000000Z'
    Customer:
      type: object
      required:
        - id
        - surnom
        - user_id
      properties:
        id:
          type: integer
          example: 1
        surnom:
          type: string
          example: Client1
        user_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: '2024-10-09T10:00:00.000000Z'
        updated_at:
          type: string
          format: date-time
