openapi: 3.0.0
info:
  title: 'Laravel CRUD API'
  description: "Documentation de l'API pour gérer les utilisateurs, clients, matériaux, ventes et tickets"
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8741/api'
    description: 'Serveur local'
paths:
  /login:
    post:
      summary: 'Authentifie un utilisateur et retourne un token'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: test@test.com
                password:
                  type: string
                  example: test
              required:
                - email
                - password
      responses:
        '200':
          description: 'Authentification réussie'
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: 'Identifiants invalides'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
  /user:
    get:
      summary: "Récupère l'utilisateur authentifié"
      tags:
        - Authentication
      security:
        -
          bearerAuth: []
      responses:
        '200':
          description: 'Utilisateur authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: 'Non authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
  /utilisateur/ping:
    get:
      summary: "Ping pour tester l'accès utilisateur"
      tags:
        - Utilisateur
      responses:
        '200':
          description: 'Réponse de ping réussie'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: pong
                  timestamp:
                    type: string
                    format: date-time
                    example: '2024-10-09 12:00:00'
  /material/ping:
    get:
      summary: "Ping pour tester l'accès matériel"
      tags:
        - Material
      responses:
        '200':
          description: 'Réponse de ping réussie'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: pong
                  timestamp:
                    type: string
                    format: date-time
                    example: '2024-10-09 12:00:00'
  /client:
    get:
      summary: 'Liste tous les clients'
      tags:
        - Client
      security:
        -
          bearerAuth: []
      responses:
        '200':
          description: 'Liste des clients'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerWithUser'
        '401':
          description: 'Non authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
    post:
      summary: 'Crée un nouveau client'
      tags:
        - Client
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        '201':
          description: 'Client créé'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerWithUser'
        '401':
          description: 'Non authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '422':
          description: 'Validation échouée'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'
  '/client/{id}':
    get:
      summary: 'Récupère un client spécifique'
      tags:
        - Client
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: 'Détails du client'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerWithUser'
        '401':
          description: 'Non authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '404':
          description: 'Client non trouvé'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
    put:
      summary: 'Met à jour un client'
      tags:
        - Client
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        '200':
          description: 'Client mis à jour'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerWithUser'
        '401':
          description: 'Non authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '404':
          description: 'Client non trouvé'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: 'Validation échouée'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorValidation'
    delete:
      summary: 'Supprime un client'
      tags:
        - Client
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: 'Client supprimé'
        '401':
          description: 'Non authentifié'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '404':
          description: 'Client non trouvé'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
